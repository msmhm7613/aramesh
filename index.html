<!DOCTYPE html>

<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <title>مسیریاب لحظه‌ای</title>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>

        body {
            margin: 0;
            font-family: "B Titr";
        }

        #map {
            height: 50vh;
        }

        #panel {
            height: 5vh;
            padding: 5px;
            background: #f4f4f4;
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 15px;
        }

    </style>

</head>

<body>

<div class="row" dir="rtl">

    <div class="col-md-6 col-xs-12">
        <span class="btn btn-warning" id="speed">سرعت: 0 km/h</span>
        <span class="btn btn-warning" id="distance">مسافت: ---</span>
        <span class="btn btn-warning" id="duration">زمان: ---</span>
    </div>

    <div class="col-md-6 col-xs-12">
        <div id="mapApps">
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#myModal">
                انتخاب سایر مسیر یاب ها
            </button>
        </div>
    </div>

</div>


<!-- The Modal -->
<div class="modal fade" id="myModal">
    <div class="modal-dialog">
        <div class="modal-content" dir="rtl">

            <!-- Modal Header -->
            <div class="modal-header">
                <h4 class="modal-title">انتخاب مسیر یاب</h4>
            </div>

            <!-- Modal body -->
            <div class="modal-body">
                برنامه مسیر یاب مورد علاقه نصب شده روی تلفن همراه خود را انتخاب کنید
                <hr>
                <div class="container">
                    <div class="d-grid col-md-6 col-xs-12">
                        <button onclick="openGoogleMaps()" class="btn btn-outline-success">
                            Google Maps
                        </button>
                    </div>

                    <div class="d-grid col-md-6 col-xs-12">
                        <button onclick="openNeshan()" class="btn btn-outline-success">
                            نشان
                        </button>
                    </div>
                    <div class="row">&nbsp;</div>
                    <div class="d-grid col-md-6 col-xs-12">
                        <button onclick="openBalad()" class="btn btn-outline-success">
                            بلد
                        </button>
                    </div>

                    <div class="d-grid col-md-6 col-xs-12">
                        <button onclick="openWaze()" class="btn btn-outline-success">
                            Waze
                        </button>
                    </div>
                </div>
            </div>

            <!-- Modal footer -->
            <div class="modal-footer">
                <button type="button" class="btn btn-danger" data-bs-dismiss="modal">بستن</button>
            </div>

        </div>
    </div>
</div>
<!--end modal-->

<div id="map"></div>

<div dir="rtl" id="navigation" style="
padding:12px;
background:#fff3cd;
border-bottom:1px solid #ddd;
font-size:18px;
font-weight:bold;
text-align:center;
">
    در حال محاسبه مسیر...
</div>

<div dir="rtl" id="steps"
     style="
padding:10px;
max-height:250px;
overflow-y:auto;
background:#f8f9fa;
">
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

    let currentStepIndex = 0;
    let lastRouteUpdate = 0;
    let lastLat = null;
    let lastLng = null;

    let userCurrentLat = null;
    let userCurrentLng = null;

    const destination = {
        /*lat: 32.144369570819734,
        lng: 54.112763037090076*/
        lat: 31.856782644793213,
        lng: 54.34915489309451
    };

    const map = L.map('map').setView(
        [destination.lat, destination.lng],
        13
    );

    L.tileLayer(
        'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            maxZoom: 19
        }
    ).addTo(map);

    const carIcon = L.icon({
        iconUrl: "https://cdn-icons-png.flaticon.com/512/744/744465.png",
        iconSize: [40, 40],
        iconAnchor: [20, 20]
    });

    let driverMarker = null;
    let routeLine = null;

    L.marker([
        destination.lat,
        destination.lng
    ]).addTo(map)
        .bindPopup("مقصد");

    async function updateRoute(lat, lng) {

        const url =
            `https://router.project-osrm.org/route/v1/driving/${lng},${lat};${destination.lng},${destination.lat}?overview=full&steps=true&geometries=geojson`;

        const response = await fetch(url);
        const data = await response.json();

        if (!data.routes || !data.routes.length) {
            return;
        }

        const route = data.routes[0];

        updateNavigation(route, lat, lng);
        renderSteps(route);

        const coordinates =
            route.geometry.coordinates.map(
                p => [p[1], p[0]]
            );

        if (!routeLine) {

            routeLine = L.polyline(
                coordinates,
                {
                    weight: 6
                }
            ).addTo(map);

        } else {

            routeLine.setLatLngs(
                coordinates
            );

        }

        document.getElementById("distance").innerHTML =
            "مسافت: " +
            (route.distance / 1000).toFixed(2) +
            " km";

        document.getElementById("duration").innerHTML =
            "زمان: " +
            Math.round(route.duration / 60) +
            " min";

        const remain = route.distance;

        if (remain < 30) {
            alert("به مقصد رسیدید");
        }
    }

    function renderSteps(route) {

        const steps = route.legs[0].steps;


        let html = "";

        steps.forEach((step, index) => {

            let icon = "⬆️";
            let text = "";
            let bg = "#fff";
            let color = "#000";

            const roadName =
                step.name?.trim() || "";

            if (step.maneuver.type === "turn") {

                if (step.maneuver.modifier === "right") {
                    icon = "➡️";
                    text = "به راست  بپیچید";
                } else if (step.maneuver.modifier === "left") {
                    icon = "⬅️";
                    text = "به چپ بپیچید";
                } else {
                    text = "تغییر مسیر";
                }

            } else if (
                step.maneuver.type === "roundabout"
            ) {

                icon = "🔄";
                text = "ورود به میدان";

            } else if (
                step.maneuver.type === "arrive"
            ) {

                icon = "🏁";
                text = "رسیدن به مقصد";

            } else {

                text = "مستقیم حرکت کنید";

            }

            if (index < currentStepIndex) {

                bg = "#28a745";
                color = "white";

            } else if (index === currentStepIndex) {

                bg = "#007bff";
                color = "white";

            }

            html += `
         <div style="
            padding:10px;
            border-bottom:1px solid #ddd;
            background:${bg};
            color:${color};
        ">
            <b>${index + 1}.</b>
            ${icon}
            ${text}
                ${
                roadName
                    ? `<div style="font-size:13px;margin-top:4px;"><b>
            ${Math.round(step.distance)}
            متر دیگر
            </b> به سمت
             ${roadName} &nbsp; حرکت کنید
           </div>`
                    : ""
            }
            <br>

        </div>
        `;
        });

        document
            .getElementById("steps")
            .innerHTML = html;
    }

    function updateNavigation(route, lat, lng) {

        if (
            !route.legs ||
            !route.legs.length ||
            !route.legs[0].steps.length
        ) {
            return;
        }

        const steps = route.legs[0].steps;

        let nearestStep = 0;
        let nearestDistance = Infinity;

        steps.forEach((step, index) => {

            const distance =
                getDistance(
                    lat,
                    lng,
                    step.maneuver.location[1],
                    step.maneuver.location[0]
                );

            if (distance < nearestDistance) {

                nearestDistance = distance;
                nearestStep = index;

            }

        });

        currentStepIndex = nearestStep;

        const step = steps[currentStepIndex];
        const nextStep =
            steps[currentStepIndex + 1];

        const nextRoad =
            nextStep?.name || "";

        const roadName =
            step.name && step.name.trim() !== ""
                ? step.name
                : "مسیر پیش رو";

        let text =
            `⬆️ ${Math.round(step.distance)} ` + ` متر دیگر در ${roadName} مستقیم حرکت کنید`;
        if (step.maneuver.type === "turn") {

            if (step.maneuver.modifier === "right") {
                text =
                    `➡️ ${Math.round(step.distance)} متر دیگر به راست به سمت ${roadName} بپیچید`;
            }

            if (step.maneuver.modifier === "left") {
                text =
                    `⬅️ ${Math.round(step.distance)} متر دیگر به چپ به سمت ${roadName} بپیچید`;
            }

            if (step.maneuver.modifier === "slight-right") {
                text =
                    `↗️ ${Math.round(step.distance)} متر جلوتر کمی به راست بروید`;
            }

            if (step.maneuver.modifier === "slight-left") {
                text =
                    `↖️ ${Math.round(step.distance)} متر جلوتر کمی به چپ بروید`;
            }
        }

        if (step.maneuver.type === "roundabout") {
            text =
                `🔄 در میدان از خروجی مناسب خارج شوید`;
        }

        if (step.maneuver.type === "arrive") {
            text =
                `🏁 به مقصد رسیدید`;
        }

        document.getElementById("navigation")
            .innerHTML = text;
    }

    function getDistance(lat1, lon1, lat2, lon2) {

        const R = 6371000;

        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;

        const a =
            Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) *
            Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) *
            Math.sin(dLon / 2);

        return R * (
            2 * Math.atan2(
                Math.sqrt(a),
                Math.sqrt(1 - a)
            )
        );
    }

    navigator.geolocation.watchPosition(
        async (position) => {

            userCurrentLat = position.coords.latitude;
            userCurrentLng = position.coords.longitude;

            const lat =
                position.coords.latitude;


            const lng =
                position.coords.longitude;

            const speed =
                position.coords.speed || 0;

            document.getElementById("speed")
                .innerHTML =
                "سرعت: " +
                (speed * 3.6).toFixed(1) +
                " km/h";

            if (!driverMarker) {

                driverMarker =
                    L.marker(
                        [lat, lng],
                        {
                            icon: carIcon
                        }
                    )
                        .addTo(map)
                        .bindPopup("خودرو");

                map.setView([lat, lng], 15);

            } else {

                driverMarker.setLatLng(
                    [lat, lng]
                );
            }

            const movedEnough =
                lastLat === null ||
                getDistance(
                    lastLat,
                    lastLng,
                    lat,
                    lng
                ) > 20;

            const enoughTimePassed =
                Date.now() - lastRouteUpdate > 5000;

            if (movedEnough && enoughTimePassed) {

                lastLat = lat;
                lastLng = lng;

                lastRouteUpdate = Date.now();

                await updateRoute(
                    lat,
                    lng
                );
            }

        },

        (err) => {
            alert(
                "اجازه دسترسی به GPS داده نشد"
            );
        },

        {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 10000
        }
    );


    function openGoogleMaps() {

        const url =
            `https://www.google.com/maps/dir/?api=1&destination=${destination.lat},${destination.lng}`;

        window.open(url, "_blank");

    }

    function openNeshan() {

        window.open(
            `https://nshn.ir/?lat=${destination.lat}&lng=${destination.lng}`,
            // `https://neshan.org/maps/routing/car/destination/${destination.lat},${destination.lng}`,

            '_blank'
        );

    }

    function openBalad() {

        window.open(
            `https://balad.ir/p/${userCurrentLat},${userCurrentLng}`,
            // `https://balad.ir/directions/driving?origin=${userCurrentLng},${userCurrentLat}&destination=${destination.lng},${destination.lat}`,
            '_blank'
        );

    }

    function openWaze() {

        window.open(
            `https://waze.com/ul?ll=${destination.lat},${destination.lng}&navigate=yes`,
            '_blank'
        );

    }

</script>

</body>
</html>
